<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Assistant</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      /* Gutter so the panel's drop shadow has room to render
         inside the transparent window */
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        padding: 10px;
      }
      #root > * {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/assistant/main.tsx"></script>
  </body>
</html>
