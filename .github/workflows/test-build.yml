name: "Test Build"

# Manually-triggered UNSIGNED build for testing. Reuses the production build.yml
# but with sign-binaries: false, so it needs NO Apple/Azure signing certificates.
# Installers are uploaded as downloadable artifacts (not a GitHub Release).
#
# Trigger from the CLI:  gh workflow run test-build.yml --repo <owner>/<repo>
# or from the Actions tab -> "Test Build" -> "Run workflow".
#
# NOTE: this first pass covers the mainstream x86_64 desktops + Apple Silicon.
# The Windows-on-ARM and Linux-ARM targets from release.yml are intentionally
# omitted here (they have the most fragile toolchain setup); add them once the
# mainstream targets are green.

on: workflow_dispatch

jobs:
  test-build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # Apple Silicon (M1+)
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-24.04" # deb + AppImage + RPM. 24.04's PipeWire is
            # new enough for xcap's libspa; 22.04's is too old (libspa won't compile).
            args: "--bundles deb,appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest" # .msi + NSIS .exe
            args: ""
            target: "x86_64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: false
      upload-artifacts: true
      asset-prefix: "speakoflow-test"
      no-cache: false
    secrets: inherit
